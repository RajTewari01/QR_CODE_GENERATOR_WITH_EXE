# ──────────────────────────────────────────────────────────────
#  Galaxy QR Core — Stale Issue / PR Management
#  Auto-labels and closes idle issues and pull requests
# ──────────────────────────────────────────────────────────────
name: "Issues Cleanup"

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: "🧹 Mark & Close Stale"
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 Stale Bot
        uses: actions/stale@v9
        with:
          stale-issue-message: >
            ⏰ This issue has been automatically marked as **stale** because it
            has not had recent activity. It will be closed in 7 days if no
            further activity occurs. If this is still relevant, please comment
            to keep it open.
          stale-pr-message: >
            ⏰ This pull request has been automatically marked as **stale**
            because it has not had recent activity. It will be closed in 7 days
            if no further activity occurs.
          close-issue-message: >
            🔒 This issue was closed automatically due to inactivity.
            Feel free to re-open if still relevant.
          close-pr-message: >
            🔒 This pull request was closed automatically due to inactivity.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
