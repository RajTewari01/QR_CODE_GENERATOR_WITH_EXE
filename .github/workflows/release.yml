# ──────────────────────────────────────────────────────────────
#  Galaxy QR Core — Release Pipeline
#  Triggers on version tags (v*), builds all platforms, creates
#  a GitHub Release with attached binaries.
# ──────────────────────────────────────────────────────────────
name: "Release Pipeline"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.2.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build Matrix ─────────────────────────────────────────
  build:
    name: "📦 Package · ${{ matrix.platform }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            artifact_name: GalaxyQR-Windows.exe
            artifact_path: dist/GalaxyQR.exe
          - os: macos-latest
            platform: macOS
            artifact_name: GalaxyQR-macOS.app.zip
            artifact_path: dist/GalaxyQR.app
          - os: ubuntu-latest
            platform: Linux
            artifact_name: GalaxyQR-Linux
            artifact_path: dist/GalaxyQR

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: 🐧 System Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libglib2.0-0 libdbus-1-3

      - name: 📦 Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: bash

      - name: 🔨 PyInstaller Build
        run: pyinstaller UltimateQR.spec
        shell: bash

      - name: 📁 Package macOS App
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r GalaxyQR-macOS.app.zip GalaxyQR.app
        shell: bash

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

  # ── Create Release ───────────────────────────────────────
  release:
    name: "🚀 Publish Release"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: 📋 List Release Assets
        run: find ./release-assets -type f | head -20

      - name: 🏷️ Resolve Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Galaxy QR Core ${{ steps.tag.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, 'rc') || contains(steps.tag.outputs.version, 'beta') }}
          files: |
            release-assets/**/*
          body: |
            ## 🌌 Galaxy QR Core ${{ steps.tag.outputs.version }}

            ### Downloads

            | Platform | File |
            |:---------|:-----|
            | 🪟 Windows | `GalaxyQR-Windows.exe` |
            | 🍎 macOS | `GalaxyQR-macOS.app.zip` |
            | 🐧 Linux | `GalaxyQR-Linux` |

            ### Installation
            1. Download the binary for your platform
            2. **Windows**: Double-click to run (no install needed)
            3. **macOS**: Unzip → Drag to Applications → Right-click → Open
            4. **Linux**: `chmod +x GalaxyQR-Linux && ./GalaxyQR-Linux`

            ---
            _See the [full changelog](https://github.com/RajTewari01/galaxy-qr-generator/blob/main/README.md) for details._
